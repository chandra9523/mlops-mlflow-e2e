name: Full MLOps Pipeline

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "*/10 * * * *"

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    - name: Install dependencies
      run: pip install -r requirements.txt

    # 🧪 TESTING (BLOCKER)
    - name: Run Tests
      run: pytest tests/

    # 🔍 DRIFT
    - name: Drift Detection
      run: python src/drift_detection.py

    # 📉 PERFORMANCE
    - name: Evaluate
      run: python src/evaluate.py

    # 🔄 RETRAIN
    - name: Retrain
      if: failure()
      run: python src/train.py

    # 🚀 PROMOTE MODEL
    - name: Promote
      if: failure()
      run: python src/promote_model.py

    # 🚀 DEPLOY
    - name: Deploy
      if: success()
      run: echo "Deploying latest model"
