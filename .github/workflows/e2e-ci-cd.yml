name: Full MLOps Pipeline

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "*/10 * * * *"

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
    # ✅ Checkout
    - name: Checkout
      uses: actions/checkout@v3

    # ✅ Setup Python
    - name: Setup Python
      uses: actions/setup-python@v3
      with:
        python-version: '3.10'

    # ✅ Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 🔥 Start FastAPI server
    - name: Start API server
      run: |
        uvicorn app:app --host 127.0.0.1 --port 8001 &

    # 🔥 Wait for API readiness
    - name: Wait for API
      run: |
        until curl -s http://127.0.0.1:8001; do
          echo "Waiting for API..."
          sleep 2
        done

    # 🧪 TESTING
    - name: Run Tests
      run: pytest tests/

    # 🔍 DRIFT DETECTION
    - name: Drift Detection
      id: drift
      run: |
        python src/drift_detection.py > drift.txt
        cat drift.txt
        if grep -q "DRIFT_DETECTED=True" drift.txt; then
          echo "drift=true" >> $GITHUB_OUTPUT
        else
          echo "drift=false" >> $GITHUB_OUTPUT
        fi

    # 📉 PERFORMANCE EVALUATION
    - name: Evaluate
      id: eval
      run: |
        python src/evaluate.py > eval.txt
        cat eval.txt
        if grep -q "MODEL_OK=True" eval.txt; then
          echo "ok=true" >> $GITHUB_OUTPUT
        else
          echo "ok=false" >> $GITHUB_OUTPUT
        fi

    # 🔄 RETRAIN (only if drift OR bad performance)
    - name: Retrain
      if: steps.drift.outputs.drift == 'true' || steps.eval.outputs.ok == 'false'
      run: python src/train.py

    # 🚀 PROMOTE MODEL
    - name: Promote Model
      if: steps.drift.outputs.drift == 'true' || steps.eval.outputs.ok == 'false'
      run: python src/promote_model.py

    # 🚀 DEPLOY
    - name: Deploy
      run: echo "Deploying latest model"